apiVersion: 1

datasources:
  # ── InfluxDB (primary) ────────────────────────────────────────────────
  - name: InfluxDB
    type: influxdb
    access: proxy
    url: http://influxdb:8086
    isDefault: true
    editable: false
    jsonData:
      version: Flux
      organization: sentinel
      defaultBucket: sentinel-metrics
      tlsSkipVerify: true
    secureJsonData:
      token: ${INFLUX_TOKEN}

  # ── Prometheus ────────────────────────────────────────────────────────
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: false
    editable: false
    jsonData:
      timeInterval: 15s
      httpMethod: POST
