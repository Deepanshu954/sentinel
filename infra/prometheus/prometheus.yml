global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "gateway"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["gateway:8080"]
        labels:
          service: "gateway"

  - job_name: "orchestrator"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: ["orchestrator:8080"]
        labels:
          service: "orchestrator"

  - job_name: "ml-service"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["ml-service:8000"]
        labels:
          service: "ml-service"

  - job_name: "demo-backend"
    metrics_path: "/metrics"
    dns_sd_configs:
      - names: ["demo-backend"]
        type: "A"
        port: 8081
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance

