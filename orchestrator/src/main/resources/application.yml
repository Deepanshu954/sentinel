spring:
  application:
    name: sentinel-orchestrator
  datasource:
    # Use standard JDBC formatting; container will supply Postgres container references natively
    url: jdbc:postgresql://postgres:5432/${POSTGRES_DB:sentinel}
    username: ${POSTGRES_USER:sentinel}
    password: ${POSTGRES_PASSWORD:sentinel123}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  data:
    redis:
      # We utilize Spring Boot 3 dynamic binding mappings. 
      # (spring.data.redis instead of spring.redis)
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
  kafka:
    bootstrap-servers: ${KAFKA_BROKERS:kafka:9092}
    consumer:
      group-id: orchestrator-group

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  metrics:
    export:
      prometheus:
        enabled: true

influx:
  url: ${INFLUX_URL:http://influxdb:8086}
  token: ${INFLUX_TOKEN:sentinel-influx-admin-token}
  org: ${INFLUX_ORG:sentinel}
  bucket: ${INFLUX_BUCKET:sentinel-metrics}

sentinel:
  confidence:
    threshold: ${CONFIDENCE_THRESHOLD:0.75}
  polling:
    interval:
      ms: 5000
  scaling:
    mode: ${SCALER_MODE:local}
    sidecar-url: ${SCALING_SIDECAR_URL:http://scaling-sidecar:5050}
    target-service: ${SCALING_TARGET_SERVICE:demo-backend}
    min-replicas: ${SCALING_MIN_REPLICAS:1}
    max-replicas: ${SCALING_MAX_REPLICAS:6}
    cooldown-seconds: ${SCALING_COOLDOWN_SECONDS:60}
    max-step-size: ${SCALING_MAX_STEP:2}
    scale-out-rate-threshold: ${SCALING_OUT_THRESHOLD:500}
    scale-in-rate-threshold: ${SCALING_IN_THRESHOLD:200}
    scale-in-delay-seconds: ${SCALING_IN_DELAY:120}
    aws:
      region: ${AWS_REGION:us-east-1}
      asg-name: ${AWS_ASG_NAME:}

