services:
  # ─── API Gateway (Go) ────────────────────────────────────────────────────────
  gateway:
    build: ./gateway
    container_name: sentinel-gateway
    ports:
      - "8080:8080"
    environment:
      - JWT_SECRET=${JWT_SECRET:-sentinel-super-secret-jwt-key-change-in-prod}
      - REDIS_ADDR=redis:6379
      - KAFKA_BROKERS=kafka:9092
      - TARGET_URL=${TARGET_URL}
      - INFLUX_URL=http://influxdb:8086
      - INFLUX_TOKEN=sentinel-influx-admin-token
      - INFLUX_ORG=sentinel
      - INFLUX_BUCKET=sentinel-metrics
      - RATE_LIMIT_PER_MIN=${RATE_LIMIT_PER_MIN}
      - ML_SERVICE_URL=${ML_SERVICE_URL}
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - sentinel-network
    restart: unless-stopped

  # ─── Apache Kafka (KRaft – no Zookeeper) ─────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: sentinel-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:29093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - sentinel-network
    restart: unless-stopped

  # ─── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: sentinel-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - sentinel-network
    restart: unless-stopped

  # ─── InfluxDB ────────────────────────────────────────────────────────────────
  influxdb:
    image: influxdb:2.7
    container_name: sentinel-influxdb
    ports:
      - "8086:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: sentinel-influx-password
      DOCKER_INFLUXDB_INIT_ORG: sentinel
      DOCKER_INFLUXDB_INIT_BUCKET: sentinel-metrics
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: sentinel-influx-admin-token
      DOCKER_INFLUXDB_INIT_RETENTION: 15d
    volumes:
      - influxdb-data:/var/lib/influxdb2
      - influxdb-config:/etc/influxdb2
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - sentinel-network
    restart: unless-stopped

  # ─── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: sentinel-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=sentinel
      - POSTGRES_PASSWORD=sentinel-password
      - POSTGRES_DB=sentinel
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - sentinel-network
    restart: unless-stopped

  # ─── ML Service (Python / FastAPI) ───────────────────────────────────────────
  ml-service:
    build: ./ml-service
    container_name: sentinel-ml-service
    ports:
      - "8000:8000"
    environment:
      - INFLUX_URL=http://influxdb:8086
      - INFLUX_TOKEN=sentinel-influx-admin-token
      - INFLUX_ORG=sentinel
      - INFLUX_BUCKET=sentinel-metrics
      - KAFKA_BROKERS=kafka:9092
    depends_on:
      influxdb:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - sentinel-network
    volumes:
      - ./ml-service/model_weights:/app/models
    restart: unless-stopped

  # ─── Orchestrator (Spring Boot) ──────────────────────────────────────────────
  orchestrator:
    build: ./orchestrator
    container_name: sentinel-orchestrator
    ports:
      - "8090:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/sentinel
      - SPRING_DATASOURCE_USERNAME=sentinel
      - SPRING_DATASOURCE_PASSWORD=sentinel-password
      - REDIS_ADDR=${REDIS_ADDR:-redis:6379}
      - KAFKA_BROKERS=${KAFKA_BROKERS:-kafka:9092}
      - INFLUX_URL=http://influxdb:8086
      - INFLUX_TOKEN=sentinel-influx-admin-token
      - INFLUX_ORG=sentinel
      - INFLUX_BUCKET=sentinel-metrics
      - ML_SERVICE_URL=http://ml-service:8000
      - CONFIDENCE_THRESHOLD=0.01
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      influxdb:
        condition: service_healthy
    networks:
      sentinel-network:
        aliases:
          - orchestrator
    restart: unless-stopped

  # ─── Prometheus ──────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: sentinel-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
    networks:
      - sentinel-network
    restart: unless-stopped

  # ─── Grafana ─────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.0
    container_name: sentinel-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: sentinel
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - sentinel-network
    restart: unless-stopped

# ─── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  kafka-data:
  redis-data:
  influxdb-data:
  influxdb-config:
  postgres-data:
  prometheus-data:
  grafana-data:

# ─── Networks ─────────────────────────────────────────────────────────────────
networks:
  sentinel-network:
    driver: bridge
